# ============================================
# CineAI - Docker Compose Orchestration
# ============================================
# Levanta los 4 contenedores: frontend, backend, llm_service, db
# Uso: docker-compose up --build -d

version: "3.9"

services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: cineai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cineai-network

  # ─────────────────────────────────────────
  # Backend API (FastAPI)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cineai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LLM_SERVICE_URL: ${LLM_SERVICE_URL}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL}
      TMDB_API_KEY: ${TMDB_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cineai-network

  # ─────────────────────────────────────────
  # LLM Recommendation Service
  # ─────────────────────────────────────────
  llm_service:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    container_name: cineai-llm
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_HOST: ${LLM_HOST}
      LLM_PORT: ${LLM_PORT}
    ports:
      - "8001:8001"
    networks:
      - cineai-network

  # ─────────────────────────────────────────
  # Frontend (React + Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cineai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cineai-network

volumes:
  postgres_data:
    driver: local

networks:
  cineai-network:
    driver: bridge
